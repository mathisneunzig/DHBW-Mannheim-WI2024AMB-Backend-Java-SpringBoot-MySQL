# Dedicated test profile using an in-memory H2 database.
# This ensures tests are isolated and do not require a running MySQL instance.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create/drop schema automatically for tests.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Disable Open Session in View in tests to keep boundaries explicit.
spring.jpa.open-in-view=false
